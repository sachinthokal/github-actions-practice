name: Main Pipeline
on:
  push:
    branches: [ main ]

jobs:
  test:
    uses: ./.github/workflows/reusable-build-test.yml

  docker:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: ${{ vars.DOCKER_USERNAME }}/fastapi-capstone
      tag: sha-${{ github.sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  security-scan:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required for SARIF upload (Brownie Points)
    steps:
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.DOCKER_USERNAME }}/fastapi-capstone:latest'
          format: 'table'
          exit-code: '1' # This fails the pipeline if issues are found
          severity: 'CRITICAL,HIGH'
  deploy:
    needs: [docker, security-scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy
        run: echo "Deploying image ${{ needs.docker.outputs.image_url }} to Production"