name: Main Pipeline
on:
  push:
    branches: [ main ]

jobs:
  test:
    uses: ./.github/workflows/reusable-build-test.yml

  docker:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: ${{ vars.DOCKER_USERNAME }}/fastapi-capstone
      tag: sha-${{ github.sha }}
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_PASSWORD }}

  security-scan:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/fastapi-capstone:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  deploy:
    needs: [docker, security-scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy
        run: echo "Deploying image ${{ needs.docker.outputs.image_url }} to Production"